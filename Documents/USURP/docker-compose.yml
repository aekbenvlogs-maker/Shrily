version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:16-alpine
    container_name: usurp_postgres
    environment:
      POSTGRES_USER: usurp_user
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-ql7PoaxFQUN0ZEKge4yWvbRjHZmpig+d}
      POSTGRES_DB: usurp_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U usurp_user -d usurp_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: usurp_backend
    env_file:
      - .env.secrets
      - .env
    environment:
      DATABASE_URL: postgresql://usurp_user:${POSTGRES_PASSWORD:-ql7PoaxFQUN0ZEKge4yWvbRjHZmpig+d}@postgres:5432/usurp_db
      SECRET_KEY: ${JWT_SECRET:-KCpC+a5Do3Wc8D2xzFZXBv97i05XmlIXia+kP81R/Ew=}
      ALGORITHM: HS256
      ACCESS_TOKEN_EXPIRE_MINUTES: 30
      ENVIRONMENT: production
      DEBUG: "False"
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app

  # React Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: usurp_frontend
    env_file:
      - .env
    environment:
      REACT_APP_API_URL: http://localhost:8000/api/v1
      REACT_APP_ENV: production
    ports:
      - "3000:3000"
    depends_on:
      - backend

  scheduler:
    build:
      context: ./scheduler
      dockerfile: Dockerfile
    container_name: usurp_scheduler
    env_file:
      - .env
    environment:
      SCHEDULER_BACKEND_URL: http://backend:8000
    depends_on:
      - backend

  proxy:
    build:
      context: ./proxy
      dockerfile: Dockerfile
    container_name: usurp_proxy
    ports:
      - "8080:8080"
    depends_on:
      - backend
      - frontend
      - ia

  # IA / LLM microservice (Mistral 7B)
  ia:
    build:
      context: ./ia
      dockerfile: Dockerfile
    container_name: usurp_ia
    env_file:
      - .env
    environment:
      IA_SERVICE_URL: http://localhost:8500
      MISTRAL_MODEL_PATH: /models/mistral-7b-instruct-v0.2.Q4_K_M.gguf
    ports:
      - "8500:8500"
    volumes:
      - ./ia/models:/models  # Mount IA models directory (GGUF files)
    depends_on:
      - backend

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: usurp_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - redis_data:/data

  # Prometheus Metrics
  prometheus:
    image: prom/prometheus:latest
    container_name: usurp_prometheus
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=30d'
    ports:
      - "9090:9090"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data:
  prometheus_data:
