version: '3.8'
services:
  api:
    build: .
    container_name: shrily_api
    env_file:
      - .env
    ports:
      - "8000:8000"
    depends_on:
      - redis
      - db
    volumes:
      - ./src:/app/src
      - ./config:/app/config
    command: ["uvicorn", "src.applicatif.main:app", "--host", "0.0.0.0", "--port", "8000"]

  redis:
    image: redis:7-alpine
    container_name: shrily_redis
    ports:
      - "6379:6379"

  db:
    image: postgres:15-alpine
    container_name: shrily_db
    environment:
      POSTGRES_DB: shrily
      POSTGRES_USER: shrily
      POSTGRES_PASSWORD: shrily
    ports:
      - "5432:5432"
    volumes:
      - shrily_pgdata:/var/lib/postgresql/data

volumes:
  shrily_pgdata:
